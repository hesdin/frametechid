services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: frametechid-app:latest
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      APP_URL: ${APP_URL}
      DB_HOST: db
      DB_PORT: 3306
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - laravel_storage:/app/storage

  queue:
    image: frametechid-app:latest
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DB_HOST: db
      DB_PORT: 3306
    command: ["php", "artisan", "queue:work", "--verbose", "--tries=3", "--max-time=3600"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - laravel_storage:/app/storage

  scheduler:
    image: frametechid-app:latest
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DB_HOST: db
      DB_PORT: 3306
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - laravel_storage:/app/storage

  db:
    image: mariadb:11.8
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  caddy_data:
  caddy_config:
  laravel_storage:
  mariadb_data:
