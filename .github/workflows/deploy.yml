name: deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Deploy on self-hosted runner
        run: |
          set -euo pipefail
          cd /srv/frametechid

          test -f .env.production

          git fetch --all --prune
          git checkout main
          git reset --hard origin/main

          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh
